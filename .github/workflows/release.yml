name: Release Obsidian Plugin

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"
      - "v[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag (no v prefix)
        if: startsWith(github.ref_name, 'v')
        run: |
          echo "ERROR: Los tags de release NO deben tener prefijo 'v'."
          echo "Tag recibido: ${{ github.ref_name }}"
          echo "Tag esperado:  ${{ github.ref_name }} (sin la 'v')"
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            main.js \
            manifest.json \
            styles.css \
            --title "${{ github.ref_name }}" \
            --generate-notes
